name: Rentalify pipeline

# Scrapes + extracts on a schedule, then commits the new listings.json.
# That commit triggers the Pages deploy workflow.
on:
  schedule:
    # Sun / Tue / Thu at 03:00 UTC
    - cron: "0 3 * * 0,2,4"
  workflow_dispatch: # allow manual runs from the Actions tab
    inputs:
      force_scrape:
        description: "Force a fresh Apify scrape (don't reuse a recent run)"
        type: boolean
        default: false
      extract_limit:
        description: "Max posts to extract this run (0 = no cap; use a small number to pace a token-limited backfill)"
        type: string
        default: "0"
      reuse_only:
        description: "Re-extract from an EXISTING Apify dataset only — never start the actor"
        type: boolean
        default: false
      reuse_run_id:
        description: "Apify run id to reuse (optional; blank = latest SUCCEEDED run). Only used when reuse_only is on."
        type: string
        default: ""

concurrency:
  group: rentalify-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pipeline deps
        run: npm ci || npm install

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run pipeline + publish
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Make sure no API key is present so the subscription/OAuth path is used.
          ANTHROPIC_API_KEY: ""
          # Cloudflare R2 image storage (optional — without these, images keep their Facebook URLs).
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          # Manual-run toggles (empty/false on scheduled runs).
          FORCE_SCRAPE: ${{ inputs.force_scrape }}
          EXTRACT_LIMIT: ${{ inputs.extract_limit }}
          REUSE_ONLY: ${{ inputs.reuse_only }}
          REUSE_RUN_ID: ${{ inputs.reuse_run_id }}
        run: |
          node normalize.js
          node publish.mjs
          node validate.mjs web/public/listings.json

      # Persist the expensive LLM extraction cache no matter what — even if the
      # step above failed (e.g. validation) or the run was cancelled (e.g. out of
      # tokens). This is what makes extraction progress unloseable.
      - name: Save LLM progress (always)
        if: always()
        run: |
          git config user.name "rentalify-bot"
          git config user.email "actions@github.com"
          # Only the durable progress is committed: the LLM extraction cache and the
          # watermark/seen state. Per-run out/listings-*.json are gitignored (the
          # master listings-db.json is the source of truth).
          git add out/extract-cache.json state.json
          if git diff --cached --quiet; then
            echo "no progress to save"
          else
            git commit -m "wip: save extraction progress ($(date -u +%F))"
            git push
          fi

      # Only publish validated data to the site (gated on the step above passing).
      - name: Commit published data
        run: |
          git add listings-db.json web/public/listings.json
          if git diff --cached --quiet; then
            echo "no published changes"
          else
            git commit -m "data: refresh listings ($(date -u +%F))"
            git push
          fi
