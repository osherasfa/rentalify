name: Deploy frontend to Pages

# Builds the static web app and deploys it to GitHub Pages.
# Runs on pushes to main that touch the frontend or the published data,
# and can be triggered manually.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  # Re-deploy whenever the scraper pipeline finishes (its bot commit can't
  # trigger a push event, so we listen for the workflow completing instead).
  workflow_run:
    workflows: ["Rentalify pipeline"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # When triggered by the pipeline finishing, only deploy if it actually
    # succeeded — a failed pipeline shouldn't trigger a (no-op) redeploy.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build web
        working-directory: web
        run: |
          npm ci || npm install
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
